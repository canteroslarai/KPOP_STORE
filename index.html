<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KpopVault - Tienda de K-Pop</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #0f0a1f; color: #e0d4ff; }
        header { background: #ff00aa; padding: 20px; text-align: center; }
        .productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .producto { background: #1a1433; border-radius: 10px; overflow: hidden; text-align: center; padding: 15px; }
        .producto img { width: 100%; height: 220px; object-fit: cover; }
        .producto button { background: #ff00aa; color: white; border: none; padding: 10px; margin-top: 10px; cursor: pointer; border-radius: 5px; }
        .carrito { position: fixed; top: 20px; right: 20px; background: #ff00aa; color: white; padding: 10px 15px; border-radius: 50px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1433; margin: 5% auto; padding: 20px; width: 80%; max-width: 600px; border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>🎤 KpopVault</h1>
        <p>Tu tienda favorita de K-Pop</p>
    </header>

    <div class="carrito" onclick="mostrarCarrito()">🛒 Carrito (<span id="contador">0</span>)</div>

    <h2 style="text-align:center; margin:20px;">Productos Destacados</h2>
    <div class="productos" id="lista-productos"></div>

    <!-- Modal del carrito -->
    <div class="modal" id="modal-carrito">
        <div class="modal-content">
            <h2>Tu Carrito</h2>
            <div id="items-carrito"></div>
            <h3>Total: $<span id="total">0</span></h3>
            <button onclick="vaciarCarrito()" style="background:red;">Vaciar Carrito</button>
            <button onclick="cerrarCarrito()" style="margin-left:10px;">Cerrar</button>
        </div>
    </div>

    <script>
        let carrito = [];

        const productos = [
            { id: 1, nombre: "Heeseung Photocard Dark Blood", grupo: "ENHYPEN", precio: 32.50, img: "https://picsum.photos/id/1015/300/300" },
            { id: 2, nombre: "Jungwon Photocard Manifesto", grupo: "ENHYPEN", precio: 28.00, img: "https://picsum.photos/id/201/300/300" },
            { id: 3, nombre: "Ni-ki Photocard Border Carnival", grupo: "ENHYPEN", precio: 45.00, img: "https://picsum.photos/id/237/300/300" },
            { id: 4, nombre: "Lightstick Official ENHYPEN", grupo: "ENHYPEN", precio: 85.99, img: "https://picsum.photos/id/180/300/300" },
            { id: 5, nombre: "Jimin Butter Photocard", grupo: "BTS", precio: 35.99, img: "https://picsum.photos/id/251/300/300" },
        ];

        function mostrarProductos() {
            const contenedor = document.getElementById("lista-productos");
            contenedor.innerHTML = "";
            productos.forEach(p => {
                contenedor.innerHTML += `
                    <div class="producto">
                        <img src="${p.img}" alt="${p.nombre}">
                        <h3>${p.nombre}</h3>
                        <p>${p.grupo}</p>
                        <p><strong>$${p.precio}</strong></p>
                        <button onclick="agregarAlCarrito(${p.id})">Agregar al carrito</button>
                    </div>
                `;
            });
        }

        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            carrito.push(producto);
            document.getElementById("contador").textContent = carrito.length;
            alert(`${producto.nombre} agregado al carrito!`);
        }

        function mostrarCarrito() {
            const modal = document.getElementById("modal-carrito");
            const items = document.getElementById("items-carrito");
            let total = 0;
            items.innerHTML = "";
            carrito.forEach((p, index) => {
                total += p.precio;
                items.innerHTML += `<p>${p.nombre} - $${p.precio}</p>`;
            });
            document.getElementById("total").textContent = total.toFixed(2);
            modal.style.display = "block";
        }

        function cerrarCarrito() {
            document.getElementById("modal-carrito").style.display = "none";
        }

        function vaciarCarrito() {
            carrito = [];
            document.getElementById("contador").textContent = 0;
            cerrarCarrito();
        }

        // Cargar productos
        mostrarProductos();
    </script>
</body>
</html>
