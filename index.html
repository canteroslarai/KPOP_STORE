<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KpopVault - Tienda Oficial de K-Pop</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #0f0a1f; color: #e0d4ff; }
        header { background: linear-gradient(#ff00aa, #9c27b0); padding: 20px; text-align: center; }
        .filtros { padding: 20px; text-align: center; background: #1a1433; }
        .filtros input, .filtros select { padding: 10px; margin: 5px; border-radius: 8px; border: none; width: 220px; }
        .productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
        .producto { background: #1a1433; border-radius: 12px; overflow: hidden; text-align: center; padding: 15px; transition: 0.3s; cursor: pointer; }
        .producto:hover { transform: scale(1.05); box-shadow: 0 0 20px #ff00aa; }
        .producto img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .producto button { background: #ff00aa; color: white; border: none; padding: 12px; margin-top: 10px; cursor: pointer; border-radius: 8px; width: 100%; }
        .carrito { position: fixed; top: 20px; right: 20px; background: #ff00aa; color: white; padding: 12px 18px; border-radius: 50px; cursor: pointer; font-size: 18px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; overflow-y: auto; }
        .modal-content { background: #1a1433; margin: 5% auto; padding: 25px; width: 90%; max-width: 700px; border-radius: 12px; }
        form input, form select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; }
        .btn-pagar { background: #00c853; color: white; padding: 15px; font-size: 18px; width: 100%; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        footer { text-align: center; padding: 30px; background: #1a1433; margin-top: 50px; }
    </style>
</head>
<body>
    <header>
        <h1>🎤 KpopVault</h1>
        <p>Tu tienda oficial de merchandising K-Pop</p>
    </header>

    <div class="carrito" onclick="mostrarCarrito()">🛒 Carrito (<span id="contador">0</span>)</div>

    <div class="filtros">
        <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
        <select id="filtroGrupo" onchange="filtrarProductos()">
            <option value="">Todos los Grupos</option>
            <option value="ENHYPEN">ENHYPEN</option>
            <option value="BTS">BTS</option>
            <option value="BLACKPINK">BLACKPINK</option>
            <option value="Stray Kids">Stray Kids</option>
            <option value="aespa">aespa</option>
        </select>
    </div>

    <h2 style="text-align:center; margin:25px 0;">Catálogo de Productos</h2>
    <div class="productos" id="lista-productos"></div>

    <!-- Modales -->
    <div class="modal" id="modal-detalle">
        <div class="modal-content">
            <span onclick="cerrarModal()" style="float:right; font-size:30px; cursor:pointer;">&times;</span>
            <img id="img-detalle" style="width:100%; border-radius:12px;" alt="">
            <h2 id="nombre-detalle"></h2>
            <p id="grupo-detalle"></p>
            <p id="descripcion-detalle"></p>
            <h3>Precio: $<span id="precio-detalle"></span></h3>
            <button onclick="agregarDesdeDetalle()" style="width:100%; padding:12px;">Agregar al Carrito</button>
        </div>
    </div>

    <div class="modal" id="modal-carrito">
        <div class="modal-content">
            <h2>🛒 Tu Carrito</h2>
            <div id="items-carrito"></div>
            <h3>Total: $<span id="total">0</span></h3>
            <button onclick="vaciarCarrito()" style="background:#f44336;">Vaciar Carrito</button>
            <button onclick="procederAlPago()" style="background:#00c853; margin-left:10px;">Proceder al Pago</button>
            <button onclick="cerrarCarrito()" style="margin-left:10px;">Cerrar</button>
        </div>
    </div>

    <div class="modal" id="modal-checkout">
        <div class="modal-content">
            <h2>💳 Finalizar Compra</h2>
            <form id="form-compra" onsubmit="finalizarCompra(event)">
                <h3>Datos Personales</h3>
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <input type="tel" id="telefono" placeholder="Teléfono" required>
                <h3>Dirección de Envío</h3>
                <input type="text" id="direccion" placeholder="Dirección completa" required>
                <input type="text" id="ciudad" placeholder="Ciudad" required>
                <h3>Método de Pago</h3>
                <select id="metodo-pago" required>
                    <option value="">Selecciona método</option>
                    <option value="tarjeta">Tarjeta de Crédito/Débito</option>
                    <option value="paypal">PayPal</option>
                    <option value="transferencia">Transferencia Bancaria</option>
                    <option value="efectivo">Efectivo al retirar</option>
                </select>
                <button type="submit" class="btn-pagar">Confirmar Compra y Pagar</button>
            </form>
            <button onclick="cerrarCheckout()" style="margin-top:10px;">Cancelar</button>
        </div>
    </div>

    <footer>
        <p><strong>KpopVault</strong> - Actividad Formativa N°2</p>
    </footer>

    <script>
        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        let productoSeleccionado = null;

        const productos = [
            { id: 1, nombre: "Heeseung Photocard Dark Blood", grupo: "ENHYPEN", tipo: "Photocard", precio: 32.50, img: "https://i.pinimg.com/736x/22/89/0c/22890c15d3917f0115215574d19595fc.jpg", descripcion: "Photocard oficial de Heeseung" },
            { id: 2, nombre: "Jungwon Photocard Manifesto", grupo: "ENHYPEN", tipo: "Photocard", precio: 28.00, img: "https://i.pinimg.com/736x/3a/16/5b/3a165b2fe2c5f6e633ab3f773cd8dd94.jpg", descripcion: "Photocard oficial de Jungwon" },
            { id: 3, nombre: "Ni-ki Photocard Border Carnival", grupo: "ENHYPEN", tipo: "Photocard", precio: 45.00, img: "https://i.pinimg.com/736x/0d/8f/8e/0d8f8e5f0d8f8e5f0d8f8e5f0d8f8e5f.jpg", descripcion: "Photocard oficial de Ni-ki" },
            { id: 4, nombre: "ENHYPEN Official Lightstick Ver.2", grupo: "ENHYPEN", tipo: "Lightstick", precio: 89.99, img: "https://i.pinimg.com/736x/5e/d7/95/5ed7958c42bbbab595b2b2c3c2639de6.jpg", descripcion: "Lightstick oficial ENHYPEN" },
            { id: 5, nombre: "Dark Blood Album Limited", grupo: "ENHYPEN", tipo: "Album", precio: 48.50, img: "https://picsum.photos/id/251/300/300", descripcion: "Álbum Dark Blood Limited" },
            { id: 6, nombre: "Army Bomb Ver.4 Lightstick", grupo: "BTS", tipo: "Lightstick", precio: 95.00, img: "https://picsum.photos/id/180/300/300", descripcion: "Lightstick oficial BTS" },
            { id: 7, nombre: "Jimin Butter Photocard", grupo: "BTS", tipo: "Photocard", precio: 35.99, img: "https://i.pinimg.com/736x/0d/8f/8e/0d8f8e5f0d8f8e5f0d8f8e5f.jpg", descripcion: "Photocard oficial de Jimin" },
            { id: 8, nombre: "Born Pink Album", grupo: "BLACKPINK", tipo: "Album", precio: 42.00, img: "https://picsum.photos/id/201/300/300", descripcion: "Álbum Born Pink BLACKPINK" }
        ];

        // Generar más productos
        for (let i = 9; i <= 50; i++) {
            const grupos = ["ENHYPEN", "BTS", "BLACKPINK", "Stray Kids", "aespa"];
            const tipos = ["Photocard", "Album", "Lightstick"];
            const tipo = tipos[i % 3];
            const grupo = grupos[i % grupos.length];
            productos.push({
                id: i,
                nombre: `${grupo} ${tipo} Edición Especial`,
                grupo: grupo,
                tipo: tipo,
                precio: Math.round((20 + Math.random()*80)*100)/100,
                img: `https://picsum.photos/id/${100 + i}/300/300`,
                descripcion: `Producto oficial ${tipo.toLowerCase()} de ${grupo}`
            });
        }

        // Funciones (igual que antes)
        function mostrarProductos(lista) {
            const contenedor = document.getElementById("lista-productos");
            contenedor.innerHTML = "";
            lista.forEach(p => {
                contenedor.innerHTML += `
                    <div class="producto" onclick="verDetalle(${p.id})">
                        <img src="${p.img}" alt="${p.nombre}">
                        <h3>${p.nombre}</h3>
                        <p>${p.grupo}</p>
                        <p><strong>$${p.precio.toFixed(2)}</strong></p>
                        <button onclick="event.stopImmediatePropagation(); agregarAlCarrito(${p.id});">Agregar al carrito</button>
                    </div>
                `;
            });
        }

        function filtrarProductos() {
            const texto = document.getElementById("busqueda").value.toLowerCase();
            const grupo = document.getElementById("filtroGrupo").value;
            const filtrados = productos.filter(p => p.nombre.toLowerCase().includes(texto) && (grupo === "" || p.grupo === grupo));
            mostrarProductos(filtrados);
        }

        function verDetalle(id) {
            productoSeleccionado = productos.find(p => p.id === id);
            document.getElementById("img-detalle").src = productoSeleccionado.img;
            document.getElementById("nombre-detalle").textContent = productoSeleccionado.nombre;
            document.getElementById("grupo-detalle").textContent = productoSeleccionado.grupo;
            document.getElementById("descripcion-detalle").textContent = productoSeleccionado.descripcion;
            document.getElementById("precio-detalle").textContent = productoSeleccionado.precio.toFixed(2);
            document.getElementById("modal-detalle").style.display = "block";
        }

        function cerrarModal() { document.getElementById("modal-detalle").style.display = "none"; }
        function agregarDesdeDetalle() { if (productoSeleccionado) agregarAlCarrito(productoSeleccionado.id); cerrarModal(); }

        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            carrito.push(producto);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            document.getElementById("contador").textContent = carrito.length;
            alert(`✅ ${producto.nombre} agregado al carrito`);
        }

        function mostrarCarrito() {
            const items = document.getElementById("items-carrito");
            let total = 0;
            items.innerHTML = "";
            carrito.forEach(p => {
                total += p.precio;
                items.innerHTML += `<p>→ ${p.nombre} - $${p.precio.toFixed(2)}</p>`;
            });
            document.getElementById("total").textContent = total.toFixed(2);
            document.getElementById("modal-carrito").style.display = "block";
        }

        function cerrarCarrito() { document.getElementById("modal-carrito").style.display = "none"; }
        function vaciarCarrito() {
            carrito = [];
            localStorage.setItem('carrito', JSON.stringify(carrito));
            document.getElementById("contador").textContent = 0;
            cerrarCarrito();
        }

        function procederAlPago() {
            if (carrito.length === 0) return alert("El carrito está vacío");
            cerrarCarrito();
            document.getElementById("modal-checkout").style.display = "block";
        }

        function cerrarCheckout() { document.getElementById("modal-checkout").style.display = "none"; }

        function finalizarCompra(e) {
            e.preventDefault();
            const nombre = document.getElementById("nombre").value;
            alert(`🎉 ¡Compra realizada con éxito!\n\nGracias ${nombre}!\nTe contactaremos pronto.`);
            carrito = [];
            localStorage.setItem('carrito', JSON.stringify(carrito));
            document.getElementById("contador").textContent = 0;
            cerrarCheckout();
            document.getElementById("form-compra").reset();
        }

        // Inicializar
        mostrarProductos(productos);
        document.getElementById("contador").textContent = carrito.length;
    </script>
</body>
</html>
